- name: Deploy to Tomcat
  hosts: web
  become: yes
  tasks:
    - name: Copy WAR file to Tomcat
      copy:
        src: "/var/snap/jenkins/5013/workspace/MavenAnsibleWebApp1/target/MavenAnsibleWebApp1.war"
        dest: "/opt/tomcat/webapps/MavenAnsibleWebApp1.war"
        remote_src: no

    - name: Stop Tomcat
      shell: /opt/tomcat/bin/shutdown.sh || true

    - name: Wait for Tomcat to stop
      pause:
        seconds: 5

    - name: Start Tomcat
      shell: /opt/tomcat/bin/startup.sh
